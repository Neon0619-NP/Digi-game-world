<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Digi Game World</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="left-nav">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Logo" class="logo-img">
        </a>
        <h2 class="site-name">Digi Game World</h2>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="settings-menu">
          <button class="settings-btn" onclick="toggleSettingsMenu()">
            ⚙
          </button>
          <div class="settings-dropdown" id="settingsDropdown">
            <a href="profile.html">Profile</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
            <a href="#" id="logoutBtn" style="display:none;">Logout</a>
                <div class="theme-options">
                 <button onclick="setTheme('dark')">
                     🌙 Dark
                 </button>

                 <button onclick="setTheme('light')">
                      ☀ Light
                 </button>
                
                 <button onclick="setTheme('device')">
                     📱 Device
                 </button>
              </div>
          </div>
         </li>
        </ul>
    </nav>
</header>

<section class="about page-animation">
    <h2>Admin Panel</h2>

    <form id="adminProductForm" class="admin-form">
        <input type="text" id="adminProductName" placeholder="Product Name" required>
        <input type="number" id="adminProductPrice" placeholder="Product Price" required>
        <input type="text" id="adminProductImage" placeholder="Image URL" required>

        <select id="adminProductCategory" required>
          <option value="">Select Category</option>
          <option value="pc">PC / Laptops</option>
          <option value="playstation">PlayStation</option>
          <option value="xbox">Xbox</option>
          <option value="nintendo">Nintendo</option>
          <option value="repair">Repair</option>
          <option value="accessories">Accessories & Other</option>
        </select>

        <textarea id="adminProductDescription" placeholder="Product Description" required></textarea>

        <button class="shop-btn" type="submit">Add Product</button>
    </form>

    <h2>Product List</h2>
    <div id="adminProductList"></div>
    <h2>Customer Orders</h2>
    <div id="adminOrdersList"></div>
</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
