<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Digi Game World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="left-nav">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Logo" class="logo-img">
        </a>
        <h2 class="site-name">Digi Game World</h2>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
            <li><a href="cart.html">Cart 🛒 <span id="cart-count">0</span></a></li>
            <li><a href="#" id="logoutBtn" style="display:none;">Logout</a></li>
        </ul>
    </nav>
</header>

<section class="about page-animation">
    <h2>Admin Panel</h2>

    <form id="adminProductForm" class="admin-form">
        <input type="text" id="adminProductName" placeholder="Product Name" required>
        <input type="number" id="adminProductPrice" placeholder="Product Price" required>
        <input type="text" id="adminProductImage" placeholder="Image URL" required>

        <select id="adminProductCategory" required>
            <option value="">Select Category</option>
            <option value="console">Console</option>
            <option value="accessory">Accessory</option>
            <option value="setup">Setup</option>
        </select>

        <textarea id="adminProductDescription" placeholder="Product Description" required></textarea>

        <button class="shop-btn" type="submit">Add Product</button>
    </form>

    <h2>Product List</h2>
    <div id="adminProductList"></div>
</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>

<script src="script.js"></script>
</body>
</html>
