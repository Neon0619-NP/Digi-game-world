<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Digi Game World</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<header>
    <a href="index.html" class="logo-link">
     <img src="logo.png" alt="Digi Game World Logo" class="logo-img">
    </a>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart 🛒<span id="cart-count">0</span></a></li>
            <li class="settings-menu">
          <button class="settings-btn" onclick="toggleSettingsMenu()">
            ⚙
          </button>
          <div class="settings-dropdown" id="settingsDropdown">
            <a href="profile.html">Profile</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
            <a href="admin.html" id="adminNav" style="display:none;">Admin</a>
            <a href="#" id="logoutBtn" style="display:none;">Logout</a>
            
              <div class="theme-options">
                 <button onclick="setTheme('dark Mode')">
                     Dark Mode
                 </button>

                 <button onclick="setTheme('light Mode')">
                      Light Mode
                 </button>
                
                 <button onclick="setTheme('device Default')">
                     Device Default
                 </button>
              </div>
          </div>
         </li>
        </ul>
    </nav>
</header>

 <header class="mobile-header">

    <div class="mobile-topbar">

        <a href="index.html" class="mobile-logo-wrap">
            <img src="logo.png" class="mobile-logo">
        </a>

        <div class="mobile-search">
            <input type="text" placeholder="Search...">
        </div>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
         ☰
       </button>

    </div>

    <nav id="mobileNav" class="mobile-nav">

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="mobile-settings">
                <button class="settings-toggle"
                  onclick="toggleSettingsMenu()">
                  ⚙ Settings
               </button>

             <div id="mobileSettingsDropdown"
             class="mobile-settings-dropdown">
             <a href="profile.html">👤 Profile</a>
             <li id="adminNavMobile" style="display:none;">
                <a href="admin.html">⚡ Admin</a>
             </li>
             <a href="login.html">🔑 Login</a>
             <a href="signup.html">✨ Sign Up</a>
             <a href="cart.html">🛒 Cart <span id="cart-count-mobile">0</span></a>
             <button onclick="setTheme('dark')">🌙 Dark Mode</button>
             <button onclick="setTheme('light')">☀ Light Mode</button>
             <button onclick="setTheme('device')">📱 Device Default</button>
             <a href="#" id="logoutBtnMobile" style="display:none;">🚪 Logout</a>
             </div>
            </li>
        </ul>

    </nav>

 </header>

<section class="products page-animation">
    <h2>Your Shopping Cart</h2>

    <div id="cartItems"></div>

    <h2 id="cartTotal">Total: R0</h2>

    <div class="cart-buttons">
        <button class="shop-btn" onclick="clearCart()">Clear Cart</button>
        <a href="checkout.html">
            <button class="shop-btn">Checkout</button>
        </a>
    </div>
</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
