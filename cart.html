<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Digi Game World</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<header>
    <a href="index.html" class="logo-link">
     <img src="logo.png" alt="Digi Game World Logo" class="logo-img">
    </a>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart 🛒<span id="cart-count">0</span></a></li>
            <li class="settings-menu">
          <button class="settings-btn" onclick="toggleSettingsMenu()">
            ⚙
          </button>
          <div class="settings-dropdown" id="settingsDropdown">
            <a href="profile.html">Profile</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
            <a href="admin.html" id="adminNav" style="display:none;">Admin</a>
            <a href="#" id="logoutBtn" style="display:none;">Logout</a>
            
              <div class="theme-options">
                 <button onclick="setTheme('dark')">
                     🌙 Dark
                 </button>

                 <button onclick="setTheme('light')">
                      ☀ Light
                 </button>
                
                 <button onclick="setTheme('device')">
                     📱 Device
                 </button>
              </div>
          </div>
         </li>
        </ul>
    </nav>
</header>

<section class="products page-animation">
    <h2>Your Shopping Cart</h2>

    <div id="cartItems"></div>

    <h2 id="cartTotal">Total: R0</h2>

    <div class="cart-buttons">
        <button class="shop-btn" onclick="clearCart()">Clear Cart</button>
        <a href="checkout.html">
            <button class="shop-btn">Checkout</button>
        </a>
    </div>
</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
