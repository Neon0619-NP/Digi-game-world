<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Digi Game World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Digi Game World</div>
      <nav>
           <ul>
             <li><a href="index.html">Home</a></li>
             <li><a href="profile.html">Profile</a></li>
              <img src="logo.png" alt="Digi Game World Logo" class="logo-img">
           </ul>
      </nav>
</header>

<section class="about">
    <h2>Create Account</h2>

<form id="signupForm">
    <input type="text" id="signupName" placeholder="Full Name" required>
    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>

    <button class="shop-btn" type="submit">Sign Up</button>
</form>

<p>Already have an account? <a href="login.html" style="color:#00f7ff;">Login</a></p>
</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>
<script src="script.js"></script>
</body>
</html>
