<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Digi Game World</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
        <!-- LEFT SIDE -->
    <div class="left-nav">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Logo" class="logo-img">
        </a>

        <h2 class="site-name">Digi Game World</h2>
   </div>
      <nav>
           <ul>
             <li><a href="index.html">Home</a></li>
             <li class="settings-menu">
             <button class="settings-btn" onclick="toggleSettingsMenu()">
               ⚙
             </button>
              <div class="settings-dropdown" id="settingsDropdown">
                <a href="profile.html">Profile</a>
                <a href="signup.html">Sign Up</a>
                <a href="admin.html" id="adminNav" style="display:none;">Admin</a>
                <a href="#" id="logoutBtn" style="display:none;">Logout</a>

                 <div class="theme-options">
                 <button onclick="setTheme('dark')">
                     🌙 Dark
                 </button>

                 <button onclick="setTheme('light')">
                      ☀ Light
                 </button>
                
                 <button onclick="setTheme('device')">
                     📱 Device
                 </button>
                </div>
              </div>
             </li>
           </ul>
      </nav>
</header>

<section class="auth-section">

    <h2>Login</h2>

    <div class="auth-card">

        <h3>Welcome Back</h3>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>

            <input type="password" id="loginPassword" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p>
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </p>

    </div>

</section>

<footer>
    <p>© 2026 Digi Game World</p>
</footer>
<script type="module" src="script.js"></script>
</body>
</html>
