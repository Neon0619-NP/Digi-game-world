<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Digi Game World</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="left-nav">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Logo" class="logo-img">
        </a>
        <h2 class="site-name">Digi Game World</h2>
    </div>

    <nav>
        <ul>
            <li><a href="profile.html">Profile</a></li>
            <li class="settings-menu">
          <button class="settings-btn" onclick="toggleSettingsMenu()">
            ⚙
          </button>
          <div class="settings-dropdown" id="settingsDropdown">
             <a href="login.html">Login</a>
             <a href="signup.html">Sign Up</a>
             <a href="admin.html" id="adminNav" style="display:none;">Admin</a>
             <a href="#" id="logoutBtn" style="display:none;">Logout</a>
             <div class="theme-options">
                 <button onclick="setTheme('dark Mode')">
                    Dark Mode
                 </button>

                 <button onclick="setTheme('light Mode')">
                    Light Mode
                 </button>
                
                 <button onclick="setTheme('device Default')">
                    Device Default
                 </button>
              </div>
          </div>
         </li>
        </ul>
    </nav>
</header>

 <header class="mobile-header">

    <div class="mobile-topbar">

        <a href="index.html" class="mobile-logo-wrap">
            <img src="logo.png" class="mobile-logo">
        </a>

        <div class="mobile-search">
            <input type="text" placeholder="Search...">
        </div>

        <button class="mobile-menu-btn" id="mobileMenuBtn">
         ☰
       </button>

    </div>

    <nav id="mobileNav" class="mobile-nav">

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="mobile-settings">
                <button class="settings-toggle"
                  onclick="toggleSettingsMenu()">
                  ⚙ Settings
               </button>

             <div id="mobileSettingsDropdown"
             class="mobile-settings-dropdown">
             <a href="profile.html">👤 Profile</a>
             <li id="adminNavMobile" style="display:none;">
                <a href="admin.html">⚡ Admin</a>
             </li>
             <a href="login.html">🔑 Login</a>
             <a href="signup.html">✨ Sign Up</a>
             <a href="cart.html">🛒 Cart <span id="cart-count-mobile">0</span></a>
             <button onclick="setTheme('dark')">🌙 Dark Mode</button>
             <button onclick="setTheme('light')">☀ Light Mode</button>
             <button onclick="setTheme('device')">📱 Device Default</button>
             <a href="#" id="logoutBtnMobile" style="display:none;">🚪 Logout</a>
             </div>
            </li>
        </ul>

    </nav>

 </header>

<section class="about page-animation">
    <h2>My Profile</h2>

    <div class="profile-card">
        <h3 id="profileName">Name: Guest</h3>
        <p id="profileEmail">Email: Not logged in</p>
        <p id="profileStatus">Status: Guest User</p>

        <a href="products.html">
            <button class="shop-btn">Continue Shopping</button>
        </a>
    </div>

    <section class="my-orders-section">

     <h2>My Orders</h2>

     <div id="customerOrdersList"></div>

    </section>

</section>



<footer>
    <p>© 2026 Digi Game World</p>
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
